<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RailBook Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-wrap">
        <div class="auth-card" style="text-align:center">
            <div class="auth-brand">
                <i class="fa-solid fa-train-subway logo" style="font-size:44px"></i>
                <h1>RailBook Pro</h1>
                <p>Modern Railway Ticket Booking</p>
            </div>
            <p class="text-muted mb-2">Book train tickets across India with ease.</p>
            <a class="btn btn-primary btn-block mt-2" href="login.html"><i class="fa-solid fa-right-to-bracket"></i> Login</a>
            <a class="btn btn-outline btn-block mt-2" href="register.html"><i class="fa-solid fa-user-plus"></i> Create Account</a>
        </div>
    </div>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // If already logged in, jump straight to the right dashboard
        Store.load();
        if (Auth.isLoggedIn()) {
            window.location.href = Auth.isAdmin() ? 'admin/dashboard.html' : 'dashboard.html';
        }
    </script>
</body>
</html>
