<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings · RailBook Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app-shell"></div>

    <script src="js/store.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/layout.js"></script>
    <script>
        Store.load();
        if (!Auth.guard()) throw new Error('redirecting');
        var content = Layout.render({ title: 'My Bookings', active: 'history.html' });
        var esc = Utils.escapeHtml;

        content.innerHTML =
            '<div class="page-head"><h2>My Bookings</h2>' +
                '<div id="tabs">' +
                    '<button class="btn btn-primary btn-sm" data-tab="ALL">All</button> ' +
                    '<button class="btn btn-outline btn-sm" data-tab="UPCOMING">Upcoming</button> ' +
                    '<button class="btn btn-outline btn-sm" data-tab="COMPLETED">Completed</button> ' +
                    '<button class="btn btn-outline btn-sm" data-tab="CANCELLED">Cancelled</button>' +
                '</div>' +
            '</div>' +
            '<div id="booking-list"></div>';

        var currentTab = 'ALL';
        var today = new Date().toISOString().slice(0, 10);

        function statusBadge(s) {
            var map = { CONFIRMED: 'badge-success', COMPLETED: 'badge-info', CANCELLED: 'badge-danger', WAITING: 'badge-warning' };
            return '<span class="badge ' + (map[s] || 'badge-muted') + '">' + s + '</span>';
        }

        function matchesTab(b) {
            if (currentTab === 'ALL') return true;
            if (currentTab === 'UPCOMING') return b.status === 'CONFIRMED' && b.journeyDate >= today;
            if (currentTab === 'COMPLETED') return b.status === 'COMPLETED';
            if (currentTab === 'CANCELLED') return b.status === 'CANCELLED';
            return true;
        }

        function render() {
            var list = Api.myBookings().filter(matchesTab);
            var wrap = Utils.$('#booking-list');
            if (!list.length) {
                wrap.innerHTML = '<div class="empty-state"><i class="fa-solid fa-ticket"></i><h3>No bookings</h3><p>Bookings in this category will appear here.</p></div>';
                return;
            }
            wrap.innerHTML = list.map(function (b) {
                var canCancel = b.status === 'CONFIRMED' && b.journeyDate >= today;
                var pax = b.passengers.map(function (p) {
                    return '<span class="badge badge-muted" style="margin:2px">' + esc(p.name) + ' · ' + p.age + ' · seat ' + esc(p.seatNumber) + '</span>';
                }).join(' ');
                return '<div class="card mb-2">' +
                    '<div class="flex-between" style="flex-wrap:wrap;gap:10px">' +
                        '<div><div style="font-size:16px;font-weight:700">' + esc(b.trainName) + ' <span class="text-muted" style="font-weight:400">' + b.trainNumber + '</span></div>' +
                            '<div class="text-muted">PNR: <strong>' + b.pnr + '</strong></div></div>' +
                        '<div class="text-right">' + statusBadge(b.status) + '<div class="text-muted mt-2">' + Utils.formatCurrency(b.totalFare) + '</div></div>' +
                    '</div>' +
                    '<div class="tc-route" style="margin:14px 0">' +
                        '<div class="tc-point"><div class="place">' + esc(b.sourceStation) + '</div></div>' +
                        '<div class="tc-arrow"><i class="fa-solid fa-arrow-right-long"></i></div>' +
                        '<div class="tc-point"><div class="place">' + esc(b.destinationStation) + '</div></div>' +
                    '</div>' +
                    '<div class="flex-between" style="flex-wrap:wrap;gap:8px">' +
                        '<div class="text-muted">' + Utils.formatDate(b.journeyDate) + ' · ' + b.travelClassLabel + ' · ' + b.seatCount + ' seat(s)</div>' +
                        (canCancel ? '<button class="btn btn-danger btn-sm" data-cancel="' + b.id + '"><i class="fa-solid fa-ban"></i> Cancel</button>' : '') +
                    '</div>' +
                    '<div class="mt-2">' + pax + '</div>' +
                '</div>';
            }).join('');

            Utils.$all('[data-cancel]', wrap).forEach(function (btn) {
                btn.addEventListener('click', function () {
                    if (!confirm('Cancel this booking? Seats will be released.')) return;
                    var res = Api.cancelBooking(btn.getAttribute('data-cancel'));
                    if (!res.ok) { Utils.toast('Cannot cancel', res.error, 'error'); return; }
                    Utils.toast('Ticket Cancelled', 'Your booking has been cancelled.', 'success');
                    render();
                });
            });
        }

        Utils.$all('#tabs [data-tab]').forEach(function (btn) {
            btn.addEventListener('click', function () {
                currentTab = btn.getAttribute('data-tab');
                Utils.$all('#tabs [data-tab]').forEach(function (b) { b.className = 'btn btn-outline btn-sm'; });
                btn.className = 'btn btn-primary btn-sm';
                render();
            });
        });

        render();
    </script>
</body>
</html>
