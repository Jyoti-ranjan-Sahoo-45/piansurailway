<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Ticket · RailBook Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app-shell"></div>

    <script src="js/store.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/layout.js"></script>
    <script>
        Store.load();
        if (!Auth.guard()) throw new Error('redirecting');
        var content = Layout.render({ title: 'Book Ticket', active: 'booking.html' });
        var el = Utils.el, esc = Utils.escapeHtml;

        var trains = Api.trainsEnriched();
        var preTrainId = Utils.queryParam('trainId');
        var preDate = Utils.queryParam('date');

        var trainOptions = trains.map(function (t) {
            return '<option value="' + t.id + '"' + (String(t.id) === String(preTrainId) ? ' selected' : '') + '>' +
                esc(t.name) + ' (' + t.trainNumber + ') — ' + esc(t.sourceStationName) + ' → ' + esc(t.destinationStationName) + '</option>';
        }).join('');

        var classOptions = Object.keys(Api.CLASS_LABELS).map(function (c) {
            return '<option value="' + c + '">' + Api.CLASS_LABELS[c] + ' (×' + Api.FARE_MULTIPLIER[c] + ')</option>';
        }).join('');

        content.innerHTML =
            '<div class="grid-2">' +
              '<div class="card"><h3><i class="fa-solid fa-ticket" style="color:var(--primary)"></i> Booking Details</h3>' +
                '<form id="booking-form" novalidate>' +
                  '<div class="form-group"><label>Train</label><select class="form-control" name="trainId" id="trainId">' + trainOptions + '</select></div>' +
                  '<div class="form-row">' +
                    '<div class="form-group"><label>Journey Date</label><input class="form-control" type="date" name="journeyDate" id="journeyDate"></div>' +
                    '<div class="form-group"><label>Class</label><select class="form-control" name="travelClass" id="travelClass">' + classOptions + '</select></div>' +
                  '</div>' +
                  '<div class="form-group"><label>Passengers (Seats)</label>' +
                    '<select class="form-control" name="seatCount" id="seatCount">' +
                    '<option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option></select></div>' +
                  '<div class="section-title" style="margin-top:14px">Passenger Details</div>' +
                  '<div id="passenger-list"></div>' +
                  '<button class="btn btn-primary btn-block mt-3" type="submit"><i class="fa-solid fa-check"></i> Confirm Booking</button>' +
                '</form>' +
              '</div>' +
              '<div><div class="card"><h3><i class="fa-solid fa-receipt" style="color:var(--success)"></i> Fare Summary</h3><div id="summary"></div></div>' +
                '<div class="card mt-3" id="train-info-card"></div></div>' +
            '</div>';

        var form = Utils.$('#booking-form');
        form.elements.journeyDate.value = preDate || new Date().toISOString().slice(0, 10);
        form.elements.journeyDate.min = new Date().toISOString().slice(0, 10);

        function selectedTrain() { return Api.enrichTrain(Store.find('trains', form.elements.trainId.value)); }

        function renderPassengerRows() {
            var count = Number(form.elements.seatCount.value);
            var list = Utils.$('#passenger-list');
            var existing = Utils.$all('.passenger-row', list);
            var html = '';
            for (var i = 0; i < count; i++) {
                var name = existing[i] ? existing[i].querySelector('[name="p-name"]').value : '';
                var age = existing[i] ? existing[i].querySelector('[name="p-age"]').value : '';
                var gender = existing[i] ? existing[i].querySelector('[name="p-gender"]').value : 'MALE';
                html += '<div class="passenger-row">' +
                    '<div class="form-group"><label>Name</label><input class="form-control" name="p-name" value="' + esc(name) + '" placeholder="Passenger ' + (i + 1) + '"></div>' +
                    '<div class="form-group"><label>Age</label><input class="form-control" type="number" name="p-age" min="1" max="120" value="' + esc(age) + '"></div>' +
                    '<div class="form-group"><label>Gender</label><select class="form-control" name="p-gender">' +
                        '<option value="MALE"' + (gender === 'MALE' ? ' selected' : '') + '>Male</option>' +
                        '<option value="FEMALE"' + (gender === 'FEMALE' ? ' selected' : '') + '>Female</option>' +
                        '<option value="OTHER"' + (gender === 'OTHER' ? ' selected' : '') + '>Other</option></select></div>' +
                    '</div>';
            }
            list.innerHTML = html;
        }

        function renderSummary() {
            var t = selectedTrain();
            var tc = form.elements.travelClass.value;
            var seats = Number(form.elements.seatCount.value);
            var mult = Api.FARE_MULTIPLIER[tc];
            var base = t.fare * mult;
            var total = base * seats;
            Utils.$('#summary').innerHTML =
                '<div class="flex-between mt-2"><span class="text-muted">Base fare</span><span>' + Utils.formatCurrency(t.fare) + '</span></div>' +
                '<div class="flex-between mt-2"><span class="text-muted">Class (' + Api.CLASS_LABELS[tc] + ' ×' + mult + ')</span><span>' + Utils.formatCurrency(base) + '</span></div>' +
                '<div class="flex-between mt-2"><span class="text-muted">Seats</span><span>× ' + seats + '</span></div>' +
                '<hr class="mt-2" style="border:none;border-top:1px solid var(--border)">' +
                '<div class="flex-between mt-2" style="font-size:18px"><strong>Total</strong><strong style="color:var(--primary)">' + Utils.formatCurrency(total) + '</strong></div>';

            var seatClass = t.availableSeats > 100 ? 'badge-success' : (t.availableSeats > 0 ? 'badge-warning' : 'badge-danger');
            var sch = Api.scheduleForTrain(t.id) || {};
            Utils.$('#train-info-card').innerHTML =
                '<h3><i class="fa-solid fa-train" style="color:var(--accent)"></i> ' + esc(t.name) + '</h3>' +
                '<div class="text-muted mb-2">' + t.trainNumber + ' · ' + t.type + '</div>' +
                '<div class="flex-between mt-2"><span class="text-muted">Route</span><span>' + esc(t.sourceStationName) + ' → ' + esc(t.destinationStationName) + '</span></div>' +
                '<div class="flex-between mt-2"><span class="text-muted">Departure</span><span>' + (sch.departureTime || '--:--') + '</span></div>' +
                '<div class="flex-between mt-2"><span class="text-muted">Arrival</span><span>' + (sch.arrivalTime || '--:--') + '</span></div>' +
                '<div class="flex-between mt-2"><span class="text-muted">Available</span><span class="badge ' + seatClass + '">' + t.availableSeats + ' seats</span></div>';
        }

        function refresh() { renderPassengerRows(); renderSummary(); }

        form.elements.trainId.addEventListener('change', renderSummary);
        form.elements.travelClass.addEventListener('change', renderSummary);
        form.elements.seatCount.addEventListener('change', refresh);
        refresh();

        form.addEventListener('submit', function (e) {
            e.preventDefault();
            Utils.clearErrors(form);
            var valid = Utils.validateForm(form, { journeyDate: [Utils.Validators.required, Utils.Validators.futureDate] });

            var rows = Utils.$all('.passenger-row');
            var passengers = [];
            rows.forEach(function (row) {
                var nameI = row.querySelector('[name="p-name"]');
                var ageI = row.querySelector('[name="p-age"]');
                var genderI = row.querySelector('[name="p-gender"]');
                var nameErr = Utils.Validators.required(nameI.value);
                Utils.setFieldError(nameI, nameErr);
                var ageErr = Utils.Validators.positiveInt(ageI.value) || (Number(ageI.value) > 120 ? 'Age must be realistic' : '');
                Utils.setFieldError(ageI, ageErr);
                if (nameErr || ageErr) valid = false;
                passengers.push({ name: nameI.value.trim(), age: ageI.value, gender: genderI.value });
            });
            if (!valid) { Utils.toast('Check the form', 'Please fix the highlighted fields.', 'error'); return; }

            var res = Api.createBooking({
                trainId: Number(form.elements.trainId.value),
                journeyDate: form.elements.journeyDate.value,
                travelClass: form.elements.travelClass.value,
                seatCount: Number(form.elements.seatCount.value),
                passengers: passengers
            });
            if (!res.ok) { Utils.toast('Booking failed', res.error, 'error'); return; }

            Utils.toast('Booking Successful', 'PNR ' + res.booking.pnr + ' confirmed!', 'success');
            setTimeout(function () { window.location.href = 'history.html'; }, 900);
        });
    </script>
</body>
</html>
