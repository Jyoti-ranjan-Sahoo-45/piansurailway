<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard · RailBook Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div id="app-shell"></div>

    <script src="../js/store.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/layout.js"></script>
    <script>
        Store.load();
        if (!Auth.guard({ requireAdmin: true })) throw new Error('redirecting');
        var content = Layout.render({ title: 'Admin Dashboard', active: 'dashboard.html', admin: true });
        var esc = Utils.escapeHtml;
        var s = Api.adminStats();

        var cards = [
            { label: 'Total Users', value: s.totalUsers, icon: 'fa-users', cls: 'ic-blue' },
            { label: 'Total Trains', value: s.totalTrains, icon: 'fa-train', cls: 'ic-sky' },
            { label: 'Total Bookings', value: s.totalBookings, icon: 'fa-ticket', cls: 'ic-green' },
            { label: "Today's Trips", value: s.todaysTrips, icon: 'fa-calendar-day', cls: 'ic-amber' },
            { label: 'Cancelled Tickets', value: s.cancelledTickets, icon: 'fa-ban', cls: 'ic-red' },
            { label: 'Revenue', value: Utils.formatCurrency(s.revenue), icon: 'fa-indian-rupee-sign', cls: 'ic-green' },
            { label: 'Active Routes', value: s.activeRoutes, icon: 'fa-route', cls: 'ic-blue' }
        ];

        var html = '<h2 class="mb-2">Overview</h2><div class="stats-grid">';
        cards.forEach(function (c) {
            html += '<div class="stat-card"><div class="stat-icon ' + c.cls + '"><i class="fa-solid ' + c.icon + '"></i></div>' +
                '<div><div class="value">' + c.value + '</div><div class="label">' + c.label + '</div></div></div>';
        });
        html += '</div>';

        html += '<div class="section-title">Recent Bookings</div><div class="card"><div class="table-wrap">' +
            '<table class="data-table"><thead><tr><th>PNR</th><th>Passenger</th><th>Train</th><th>Date</th><th>Fare</th><th>Status</th></tr></thead>' +
            '<tbody id="recent-body"></tbody></table></div></div>';

        content.innerHTML = html;

        function statusBadge(st) {
            var map = { CONFIRMED: 'badge-success', COMPLETED: 'badge-info', CANCELLED: 'badge-danger', WAITING: 'badge-warning' };
            return '<span class="badge ' + (map[st] || 'badge-muted') + '">' + st + '</span>';
        }
        var recent = Api.allBookings().slice(0, 8);
        Utils.$('#recent-body').innerHTML = recent.map(function (b) {
            var u = Store.find('users', b.userId);
            return '<tr><td><strong>' + b.pnr + '</strong></td><td>' + esc(u ? u.fullName : '-') + '</td>' +
                '<td>' + esc(b.trainName) + '</td><td>' + Utils.formatDate(b.journeyDate) + '</td>' +
                '<td>' + Utils.formatCurrency(b.totalFare) + '</td><td>' + statusBadge(b.status) + '</td></tr>';
        }).join('') || '<tr><td colspan="6" class="text-muted">No bookings yet.</td></tr>';
    </script>
</body>
</html>
