<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Bookings · RailBook Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div id="app-shell"></div>

    <script src="../js/store.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/layout.js"></script>
    <script>
        Store.load();
        if (!Auth.guard({ requireAdmin: true })) throw new Error('redirecting');
        var content = Layout.render({ title: 'All Bookings', active: 'bookings.html', admin: true });
        var esc = Utils.escapeHtml;

        content.innerHTML =
            '<div class="page-head"><h2>All Bookings</h2></div>' +
            '<div class="card mb-2"><div class="filter-bar">' +
                '<div class="form-group"><label>Search (PNR / passenger / train)</label><input class="form-control" id="search-box" placeholder="Type to filter..."></div>' +
                '<div class="form-group"><label>Status</label><select class="form-control" id="status-filter">' +
                    '<option value="">All</option><option>CONFIRMED</option><option>COMPLETED</option><option>CANCELLED</option></select></div>' +
            '</div></div>' +
            '<div class="card"><div class="table-wrap"><table class="data-table"><thead><tr>' +
                '<th>PNR</th><th>Passenger</th><th>Train</th><th>Route</th><th>Date</th><th>Class</th><th>Seats</th><th>Fare</th><th>Status</th><th class="text-right">Action</th>' +
            '</tr></thead><tbody id="bk-body"></tbody></table></div><div id="bk-empty"></div></div>';

        function statusBadge(s) {
            var map = { CONFIRMED: 'badge-success', COMPLETED: 'badge-info', CANCELLED: 'badge-danger', WAITING: 'badge-warning' };
            return '<span class="badge ' + (map[s] || 'badge-muted') + '">' + s + '</span>';
        }

        var today = new Date().toISOString().slice(0, 10);

        function render() {
            var q = (Utils.$('#search-box').value || '').trim().toLowerCase();
            var status = Utils.$('#status-filter').value;
            var rows = Api.allBookings().filter(function (b) {
                var u = Store.find('users', b.userId);
                var hay = (b.pnr + ' ' + (u ? u.fullName : '') + ' ' + b.trainName + ' ' + b.trainNumber).toLowerCase();
                if (q && hay.indexOf(q) === -1) return false;
                if (status && b.status !== status) return false;
                return true;
            });
            var tbody = Utils.$('#bk-body');
            var empty = Utils.$('#bk-empty');
            if (!rows.length) { tbody.innerHTML = ''; empty.innerHTML = '<div class="empty-state"><i class="fa-solid fa-ticket"></i><h3>No bookings</h3></div>'; return; }
            empty.innerHTML = '';
            tbody.innerHTML = rows.map(function (b) {
                var u = Store.find('users', b.userId);
                var canCancel = b.status === 'CONFIRMED' && b.journeyDate >= today;
                return '<tr><td><strong>' + b.pnr + '</strong></td><td>' + esc(u ? u.fullName : '-') + '</td>' +
                    '<td>' + esc(b.trainName) + '<br><small class="text-muted">' + b.trainNumber + '</small></td>' +
                    '<td>' + esc(b.sourceStation) + ' → ' + esc(b.destinationStation) + '</td>' +
                    '<td>' + Utils.formatDate(b.journeyDate) + '</td><td>' + b.travelClass + '</td><td>' + b.seatCount + '</td>' +
                    '<td>' + Utils.formatCurrency(b.totalFare) + '</td><td>' + statusBadge(b.status) + '</td>' +
                    '<td class="text-right">' + (canCancel ? '<button class="btn btn-danger btn-sm" data-cancel="' + b.id + '"><i class="fa-solid fa-ban"></i></button>' : '<span class="text-muted">—</span>') + '</td></tr>';
            }).join('');
            Utils.$all('[data-cancel]', tbody).forEach(function (btn) {
                btn.addEventListener('click', function () {
                    if (!confirm('Cancel this booking?')) return;
                    Api.cancelBooking(btn.getAttribute('data-cancel'));
                    Utils.toast('Cancelled', 'Booking cancelled and seats released.', 'success');
                    render();
                });
            });
        }

        Utils.$('#search-box').addEventListener('input', render);
        Utils.$('#status-filter').addEventListener('change', render);
        render();
    </script>
</body>
</html>
