<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users · RailBook Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div id="app-shell"></div>

    <script src="../js/store.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/admin-crud.js"></script>
    <script>
        Store.load();
        if (!Auth.guard({ requireAdmin: true })) throw new Error('redirecting');
        var content = Layout.render({ title: 'Manage Users', active: 'users.html', admin: true });
        var esc = Utils.escapeHtml;
        var V = Utils.Validators;

        function roleBadge(r) { return '<span class="badge ' + (r === 'ADMIN' ? 'badge-info' : 'badge-muted') + '">' + r + '</span>'; }

        AdminCrud.build({
            mount: content,
            title: 'Users',
            collection: 'users',
            searchKeys: ['fullName', 'email', 'username', 'phone'],
            columns: [
                { key: 'fullName', label: 'Name', render: function (u) { return esc(u.fullName); } },
                { key: 'username', label: 'Username', render: function (u) { return esc(u.username); } },
                { key: 'email', label: 'Email', render: function (u) { return esc(u.email); } },
                { key: 'phone', label: 'Phone', render: function (u) { return esc(u.phone); } },
                { key: 'role', label: 'Role', render: function (u) { return roleBadge(u.role); } },
                { key: 'active', label: 'Status', render: function (u) { return u.active ? '<span class="badge badge-success">Active</span>' : '<span class="badge badge-danger">Inactive</span>'; } }
            ],
            fields: [
                { name: 'fullName', label: 'Full Name', validators: [V.required] },
                { name: 'username', label: 'Username', validators: [V.required] },
                { name: 'email', label: 'Email', validators: [V.required, V.email] },
                { name: 'phone', label: 'Phone', validators: [V.required, V.phone] },
                { name: 'password', label: 'Password', type: 'text', validators: [V.required, V.password] },
                { name: 'gender', label: 'Gender', type: 'select', options: [{ value: 'MALE', label: 'Male' }, { value: 'FEMALE', label: 'Female' }, { value: 'OTHER', label: 'Other' }] },
                { name: 'role', label: 'Role', type: 'select', options: [{ value: 'PASSENGER', label: 'Passenger' }, { value: 'ADMIN', label: 'Admin' }] },
                { name: 'active', label: 'Active', type: 'checkbox' }
            ],
            fromRecord: function (u) { return Object.assign({}, u); },
            beforeSave: function (v, editingId) {
                var dupeEmail = Store.all('users').some(function (u) { return u.id !== editingId && u.email.toLowerCase() === v.email.toLowerCase(); });
                if (dupeEmail) return 'Email already registered';
                var dupeUser = Store.all('users').some(function (u) { return u.id !== editingId && u.username.toLowerCase() === v.username.toLowerCase(); });
                if (dupeUser) return 'Username already taken';
                return null;
            },
            toRecord: function (v, editingId) {
                var rec = { fullName: v.fullName.trim(), username: v.username.trim(), email: v.email.trim(), phone: v.phone.trim(), gender: v.gender, role: v.role, active: v.active };
                if (v.password) rec.password = v.password;
                if (!editingId) rec.createdAt = Store.now();
                return rec;
            },
            canDelete: function (u) { return u.username !== 'admin'; }
        });
    </script>
</body>
</html>
