<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Trains · RailBook Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div id="app-shell"></div>

    <script src="../js/store.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/admin-crud.js"></script>
    <script>
        Store.load();
        if (!Auth.guard({ requireAdmin: true })) throw new Error('redirecting');
        var content = Layout.render({ title: 'Manage Trains', active: 'trains.html', admin: true });
        var esc = Utils.escapeHtml;
        var V = Utils.Validators;

        function stationOpts() {
            return Store.all('stations').map(function (s) { return { value: s.id, label: s.name + ' (' + s.code + ')' }; });
        }
        var typeOpts = ['RAJDHANI', 'SHATABDI', 'SUPERFAST', 'EXPRESS', 'PASSENGER', 'DURONTO'].map(function (t) { return { value: t, label: t }; });
        var statusOpts = ['ACTIVE', 'INACTIVE', 'CANCELLED'].map(function (t) { return { value: t, label: t }; });

        AdminCrud.build({
            mount: content,
            title: 'Trains',
            collection: 'trains',
            searchKeys: ['trainNumber', 'name', 'type'],
            columns: [
                { key: 'trainNumber', label: 'Number', render: function (t) { return '<strong>' + esc(t.trainNumber) + '</strong>'; } },
                { key: 'name', label: 'Name', render: function (t) { return esc(t.name); } },
                { key: 'type', label: 'Type', render: function (t) { return '<span class="badge badge-info">' + esc(t.type) + '</span>'; } },
                { key: 'route', label: 'Route', render: function (t) { return esc(Api.stationCode(t.sourceStationId)) + ' → ' + esc(Api.stationCode(t.destinationStationId)); } },
                { key: 'availableSeats', label: 'Seats', render: function (t) { return t.availableSeats + ' / ' + t.totalSeats; } },
                { key: 'fare', label: 'Fare', render: function (t) { return Utils.formatCurrency(t.fare); } },
                { key: 'status', label: 'Status', render: function (t) { return '<span class="badge ' + (t.status === 'ACTIVE' ? 'badge-success' : 'badge-danger') + '">' + esc(t.status) + '</span>'; } }
            ],
            fields: [
                { name: 'trainNumber', label: 'Train Number', validators: [V.required, V.trainNumber] },
                { name: 'name', label: 'Train Name', validators: [V.required] },
                { name: 'type', label: 'Type', type: 'select', options: typeOpts },
                { name: 'sourceStationId', label: 'Source Station', type: 'select', options: stationOpts },
                { name: 'destinationStationId', label: 'Destination Station', type: 'select', options: stationOpts },
                { name: 'totalSeats', label: 'Total Seats', type: 'number', validators: [V.required, V.positiveInt] },
                { name: 'availableSeats', label: 'Available Seats', type: 'number', validators: [V.required, V.positiveInt] },
                { name: 'fare', label: 'Base Fare (₹)', type: 'number', validators: [V.required, V.positiveInt] },
                { name: 'runningDays', label: 'Running Days', placeholder: 'e.g. MON,WED,FRI or DAILY', validators: [V.required] },
                { name: 'status', label: 'Status', type: 'select', options: statusOpts }
            ],
            fromRecord: function (t) { return Object.assign({}, t); },
            beforeSave: function (v, editingId) {
                var dupe = Store.all('trains').some(function (t) { return t.id !== editingId && t.trainNumber === String(v.trainNumber).trim(); });
                if (dupe) return 'Train number already exists';
                if (Number(v.sourceStationId) === Number(v.destinationStationId)) return 'Source and destination must differ';
                if (Number(v.availableSeats) > Number(v.totalSeats)) return 'Available seats cannot exceed total seats';
                return null;
            },
            toRecord: function (v) {
                return {
                    trainNumber: String(v.trainNumber).trim(), name: v.name.trim(), type: v.type,
                    sourceStationId: Number(v.sourceStationId), destinationStationId: Number(v.destinationStationId),
                    totalSeats: Number(v.totalSeats), availableSeats: Number(v.availableSeats),
                    fare: Number(v.fare), runningDays: v.runningDays.trim().toUpperCase(), status: v.status
                };
            }
        });
    </script>
</body>
</html>
