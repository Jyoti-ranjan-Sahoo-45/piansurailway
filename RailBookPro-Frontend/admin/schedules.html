<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Schedules · RailBook Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div id="app-shell"></div>

    <script src="../js/store.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/admin-crud.js"></script>
    <script>
        Store.load();
        if (!Auth.guard({ requireAdmin: true })) throw new Error('redirecting');
        var content = Layout.render({ title: 'Manage Schedules', active: 'schedules.html', admin: true });
        var esc = Utils.escapeHtml;
        var V = Utils.Validators;

        function trainOpts() { return Store.all('trains').map(function (t) { return { value: t.id, label: t.name + ' (' + t.trainNumber + ')' }; }); }
        function trainName(id) { var t = Store.find('trains', id); return t ? t.name + ' (' + t.trainNumber + ')' : '-'; }

        function computeDuration(dep, arr) {
            var d = dep.split(':'), a = arr.split(':');
            var mins = (Number(a[0]) * 60 + Number(a[1])) - (Number(d[0]) * 60 + Number(d[1]));
            if (mins < 0) mins += 24 * 60;
            var h = Math.floor(mins / 60), m = mins % 60;
            return (h < 10 ? '0' : '') + h + 'h ' + (m < 10 ? '0' : '') + m + 'm';
        }

        AdminCrud.build({
            mount: content,
            title: 'Schedules',
            collection: 'schedules',
            cellValue: function (r, k) { if (k === 'train') return trainName(r.trainId); return r[k]; },
            searchKeys: ['train', 'runningDays'],
            columns: [
                { key: 'train', label: 'Train', render: function (s) { return esc(trainName(s.trainId)); } },
                { key: 'departureTime', label: 'Departure' },
                { key: 'arrivalTime', label: 'Arrival' },
                { key: 'duration', label: 'Duration' },
                { key: 'platform', label: 'Platform' },
                { key: 'runningDays', label: 'Running Days', render: function (s) { return esc(s.runningDays); } }
            ],
            fields: [
                { name: 'trainId', label: 'Train', type: 'select', options: trainOpts },
                { name: 'departureTime', label: 'Departure Time', type: 'time', validators: [V.required] },
                { name: 'arrivalTime', label: 'Arrival Time', type: 'time', validators: [V.required] },
                { name: 'platform', label: 'Platform', type: 'number', validators: [V.required, V.positiveInt] },
                { name: 'runningDays', label: 'Running Days', placeholder: 'e.g. DAILY or MON,WED,FRI', validators: [V.required] }
            ],
            fromRecord: function (s) { return Object.assign({}, s); },
            toRecord: function (v) {
                return {
                    trainId: Number(v.trainId), departureTime: v.departureTime, arrivalTime: v.arrivalTime,
                    duration: computeDuration(v.departureTime, v.arrivalTime),
                    platform: Number(v.platform), runningDays: v.runningDays.trim().toUpperCase()
                };
            }
        });
    </script>
</body>
</html>
