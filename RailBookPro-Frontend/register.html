<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register · RailBook Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-wrap">
        <div class="auth-card" style="max-width:520px">
            <div class="auth-brand">
                <i class="fa-solid fa-train-subway logo"></i>
                <h1>Create your account</h1>
                <p>Join RailBook Pro to book train tickets</p>
            </div>
            <form id="register-form" novalidate>
                <div class="form-row">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input class="form-control" type="text" id="fullName" name="fullName" placeholder="Your full name">
                    </div>
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input class="form-control" type="text" id="username" name="username" placeholder="Choose a username">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input class="form-control" type="email" id="email" name="email" placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input class="form-control" type="text" id="phone" name="phone" placeholder="10-digit mobile">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <select class="form-control" id="gender" name="gender">
                            <option value="MALE">Male</option>
                            <option value="FEMALE">Female</option>
                            <option value="OTHER">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input class="form-control" type="password" id="password" name="password" placeholder="At least 6 characters">
                    </div>
                </div>
                <button class="btn btn-primary btn-block mt-2" type="submit"><i class="fa-solid fa-user-plus"></i> Register</button>
            </form>
            <div class="auth-footer">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </div>

    <script src="js/store.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        Store.load();
        var form = Utils.$('#register-form');
        form.addEventListener('submit', function (e) {
            e.preventDefault();
            var valid = Utils.validateForm(form, {
                fullName: [Utils.Validators.required],
                username: [Utils.Validators.required],
                email: [Utils.Validators.required, Utils.Validators.email],
                phone: [Utils.Validators.required, Utils.Validators.phone],
                password: [Utils.Validators.required, Utils.Validators.password]
            });
            if (!valid) return;

            var res = Auth.register({
                fullName: form.elements.fullName.value.trim(),
                username: form.elements.username.value.trim(),
                email: form.elements.email.value.trim(),
                phone: form.elements.phone.value.trim(),
                gender: form.elements.gender.value,
                password: form.elements.password.value
            });
            if (!res.ok) { Utils.toast('Registration failed', res.error, 'error'); return; }

            // Auto-login after registration
            Auth.login(res.user.username, form.elements.password.value, false);
            Utils.toast('Account created', 'Welcome to RailBook Pro!', 'success');
            setTimeout(function () { window.location.href = 'dashboard.html'; }, 600);
        });
    </script>
</body>
</html>
