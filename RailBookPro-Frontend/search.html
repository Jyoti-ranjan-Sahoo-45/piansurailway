<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Trains · RailBook Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app-shell"></div>

    <script src="js/store.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/layout.js"></script>
    <script>
        Store.load();
        if (!Auth.guard()) throw new Error('redirecting');
        var content = Layout.render({ title: 'Search Trains', active: 'search.html' });

        var stations = Store.all('stations');
        var stationOptions = '<option value="">Any</option>' + stations.map(function (s) {
            return '<option value="' + s.id + '">' + Utils.escapeHtml(s.name) + ' (' + s.code + ')</option>';
        }).join('');

        content.innerHTML =
            '<div class="card mb-2"><h3><i class="fa-solid fa-magnifying-glass" style="color:var(--primary)"></i> Find Trains</h3>' +
            '<form id="search-form"><div class="filter-bar">' +
                '<div class="form-group"><label>From</label><select class="form-control" name="source">' + stationOptions + '</select></div>' +
                '<div class="form-group"><label>To</label><select class="form-control" name="destination">' + stationOptions + '</select></div>' +
                '<div class="form-group"><label>Journey Date</label><input class="form-control" type="date" name="date"></div>' +
                '<div class="form-group"><label>Train Number</label><input class="form-control" type="text" name="trainNumber" placeholder="e.g. 12841"></div>' +
                '<div class="form-group"><label>Train Name</label><input class="form-control" type="text" name="trainName" placeholder="e.g. Rajdhani"></div>' +
                '<button class="btn btn-primary" type="submit"><i class="fa-solid fa-magnifying-glass"></i> Search</button>' +
            '</div></form></div>' +
            '<div id="results"></div>';

        var form = Utils.$('#search-form');
        var results = Utils.$('#results');
        // default date = today
        form.elements.date.value = new Date().toISOString().slice(0, 10);

        function render(list) {
            if (!list.length) {
                results.innerHTML = '<div class="empty-state"><i class="fa-solid fa-train"></i><h3>No trains found</h3><p>Try adjusting your search filters.</p></div>';
                return;
            }
            var date = form.elements.date.value;
            results.innerHTML = '<div class="section-title">' + list.length + ' train' + (list.length > 1 ? 's' : '') + ' found</div>' +
                list.map(function (t) {
                var sch = Api.scheduleForTrain(t.id) || {};
                var seatClass = t.availableSeats > 100 ? 'badge-success' : (t.availableSeats > 0 ? 'badge-warning' : 'badge-danger');
                var bookUrl = 'booking.html?trainId=' + t.id + (date ? '&date=' + date : '');
                return '<div class="train-card">' +
                    '<div class="tc-head"><div><div class="tc-name">' + Utils.escapeHtml(t.name) + '</div>' +
                        '<div class="tc-number">' + t.trainNumber + ' · ' + t.type + '</div></div>' +
                        '<span class="badge badge-info">' + Utils.escapeHtml(t.runningDays === 'MON,TUE,WED,THU,FRI,SAT,SUN' ? 'Daily' : t.runningDays) + '</span></div>' +
                    '<div class="tc-route">' +
                        '<div class="tc-point"><div class="time">' + (sch.departureTime || '--:--') + '</div><div class="place">' + Utils.escapeHtml(t.sourceStationName) + '</div></div>' +
                        '<div class="tc-arrow"><i class="fa-solid fa-arrow-right-long"></i><span class="dur">' + (sch.duration || '') + '</span></div>' +
                        '<div class="tc-point"><div class="time">' + (sch.arrivalTime || '--:--') + '</div><div class="place">' + Utils.escapeHtml(t.destinationStationName) + '</div></div>' +
                    '</div>' +
                    '<div class="tc-foot">' +
                        '<div class="seat-info"><span class="badge ' + seatClass + '">' + t.availableSeats + ' seats</span> ' +
                            '<span class="text-muted">from</span> <strong>' + Utils.formatCurrency(t.fare) + '</strong></div>' +
                        '<a class="btn btn-primary btn-sm ' + (t.availableSeats === 0 ? 'disabled' : '') + '" href="' + bookUrl + '"' +
                            (t.availableSeats === 0 ? ' onclick="return false" disabled' : '') + '><i class="fa-solid fa-ticket"></i> Book Now</a>' +
                    '</div></div>';
            }).join('');
        }

        form.addEventListener('submit', function (e) {
            e.preventDefault();
            render(Api.searchTrains({
                source: form.elements.source.value,
                destination: form.elements.destination.value,
                trainNumber: form.elements.trainNumber.value,
                trainName: form.elements.trainName.value
            }));
        });

        // Initial: show all trains
        render(Api.trainsEnriched());
    </script>
</body>
</html>
