spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.MySQLLegacyDialect
spring.jpa.open-in-view=false

# ---- Connection Pool (small pool - free tier has low connection limits & aggressive idle timeout) ----
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.max-lifetime=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# ---- Seed sample data on startup (set to false to disable) ----
railbook.seed-data=true

# ---- JWT ----
railbook.jwt.secret=cmFpbGJvb2twcm8tc3VwZXItc2VjcmV0LWtleS1jaGFuZ2UtaW4tcHJvZHVjdGlvbi0xMjM0NTY3ODkw
railbook.jwt.expiration-ms=86400000

# ---- CORS ----
railbook.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000,*

# ---- Logging ----
logging.level.root=INFO
logging.level.com.railbookpro=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ---- Swagger / OpenAPI ----
springdoc.swagger-ui.path=/swagger-ui.html
