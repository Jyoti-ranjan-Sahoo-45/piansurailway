spring.application.name=RailBookPro

# ---- Server ----
server.port=8080
server.servlet.context-path=/api

# ---- Datasource (MySQL Online Database) ----
spring.datasource.url=jdbc:mysql://sql12.freesqldatabase.com:3306/sql12833542?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&connectTimeout=60000&socketTimeout=120000&autoReconnect=true
